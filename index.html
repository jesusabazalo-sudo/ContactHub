<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ContactHub organiza contactos y oportunidades por metas para que explores, desbloquees y avances con más claridad."
    />
    <meta property="og:title" content="ContactHub - Contactos y oportunidades para avanzar" />
    <meta
      property="og:description"
      content="Explora categorías, entiende qué existe dentro y desbloquea contactos útiles según lo que quieres lograr."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#08110E" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <title>ContactHub - Contactos y oportunidades para avanzar</title>
    <script>
      // Aplica el tema antes del primer pintado para evitar parpadeo (FOUC).
      (function () {
        try {
          var stored = localStorage.getItem('contacthub_theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : prefersLight ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8KRM7DEJ1Z"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8KRM7DEJ1Z');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
